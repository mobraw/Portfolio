<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Meta Open Graph -->
    <title>Mob.raw - ???%</title>
    <meta property="og:title" content="Mob.raw | Direction Artistique">
    <meta property="og:description" content="T'as une DA en tête ? On se fait ça directttt.">
    <meta property="og:image" content="https://picsum.photos/1200/630?random=1"> 
    <meta property="og:type" content="website">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📓</text></svg>"> 
    
    <style>
        /* =========================================
           IMPORTATION DE TA POLICE MOB PSYCHO
        ========================================= */
        @font-face {
            font-family: 'MobPsychoFont';
            src: url('MobPsycho.ttf') format('truetype');
            font-weight: normal; font-style: normal;
        }

        :root {
            --dark: #050505;
            --ink-white: #f5f5f5;
            --grey-mid: #555555;
            --grey-light: #aaaaaa;
            
            --psycho-purple: #8a2be2;
            --psycho-pink: #ff007f;
            --psycho-cyan: #00f0ff;
        }

        /* 
           Retrait du scroll-behavior: smooth car il 
           rentre en conflit avec scroll-snap et crée des lags 
        */
        html {
            scroll-snap-type: y mandatory;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'MobPsychoFont', sans-serif;
            background-color: var(--dark);
            color: var(--ink-white);
            overflow-x: hidden;
            scrollbar-width: none; 
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            background-size: 200px;
        }
        body::-webkit-scrollbar { display: none; }

        h1, h2, h3 { font-family: 'MobPsychoFont', sans-serif; text-transform: uppercase; margin: 0; }

        /* =========================================
           LOADER "100%" & KATANA
        ========================================= */
        #loader {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: transparent; display: flex; justify-content: center;
            align-items: center; z-index: 9999; overflow: hidden;
        }
        .loader-bg {
            position: absolute; top: 50%; left: 50%; width: 300vw; height: 300vh;
            background: #000000; margin-left: -150vw; margin-top: -150vh;
            z-index: 1; transition: transform 1.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s 0.8s ease;
        }
        #bg-top { transform: rotate(-25deg) translateY(-50%); }
        #bg-bottom { transform: rotate(-25deg) translateY(50%); }
        #loader.split #bg-top { transform: rotate(-22deg) translateY(-100%); opacity: 0; }
        #loader.split #bg-bottom { transform: rotate(-28deg) translateY(100%); opacity: 0; }

        #slash {
            position: absolute; top: 50%; left: 50%; width: 150vw; height: 3px;
            background: #ffffff; margin-left: -75vw; margin-top: -1.5px;
            border-radius: 50%; 
            box-shadow: 0 0 15px #fff, 0 0 30px rgba(255,255,255,0.5);
            z-index: 2; opacity: 0; transform: rotate(-25deg) scaleX(0);
        }
        #loader.slash-active #slash { animation: slashAnim 0.4s cubic-bezier(0.1, 0.9, 0.2, 1) forwards; }
        @keyframes slashAnim { 0% { transform: rotate(-25deg) scaleX(0); opacity: 1; } 40% { transform: rotate(-25deg) scaleX(1); opacity: 1; } 100% { transform: rotate(-25deg) scaleX(1.5); opacity: 0; } }

        #mob-counter {
            font-size: clamp(5rem, 15vw, 20rem); line-height: 1; 
            display: flex; align-items: baseline; letter-spacing: 2px; user-select: none; 
            position: relative; z-index: 3; transition: opacity 0.2s ease, text-shadow 0.2s ease, color 0.1s ease; 
        }
        #mob-percent { font-size: clamp(4rem, 12vw, 15rem); margin-left: 5px; }

        #mob-unknown {
            font-family: 'MobPsychoFont', sans-serif;
            position: absolute;
            font-size: clamp(6rem, 20vw, 25rem);
            color: #ffffff;
            z-index: 4; opacity: 0; display: none;
            text-shadow: 0 0 30px var(--psycho-pink), 0 0 60px var(--psycho-purple);
        }

        .shake-active {
            display: block; opacity: 1;
            animation: psychoShake 0.1s infinite;
        }

        @keyframes psychoShake {
            0% { transform: translate(4px, 2px) rotate(0deg); }
            10% { transform: translate(-2px, -4px) rotate(-1deg); }
            20% { transform: translate(-5px, 0px) rotate(2deg); }
            30% { transform: translate(0px, 4px) rotate(0deg); }
            40% { transform: translate(2px, -2px) rotate(1deg); }
            50% { transform: translate(-2px, 4px) rotate(-2deg); }
            60% { transform: translate(-5px, 2px) rotate(0deg); }
            70% { transform: translate(4px, 2px) rotate(-1deg); }
            80% { transform: translate(-2px, -2px) rotate(2deg); }
            90% { transform: translate(4px, 4px) rotate(0deg); }
            100% { transform: translate(2px, -4px) rotate(-1deg); }
        }
        
        #insta-watermark {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            font-size: 1.2rem; color: #333; letter-spacing: 6px; z-index: 3; 
            transition: opacity 0.2s ease; user-select: none;
        }

        /* =========================================
           HEADER & NAVIGATION
        ========================================= */
        header, main, #side-nav { opacity: 0; transition: opacity 1.5s ease; }
        body.page-loaded header, body.page-loaded main, body.page-loaded #side-nav { opacity: 1; }

        header {
            position: fixed; top: 0; left: 0; right: 0;
            background-color: var(--dark); color: var(--ink-white);
            padding: 1.5rem 5%; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 2px solid #222; z-index: 90; 
        }
        
        header .contact-link {
            font-size: 2rem; letter-spacing: 2px;
            cursor: pointer; transition: color 0.2s ease, transform 0.2s ease;
        }
        header .contact-link:hover { color: var(--grey-light); transform: skewX(-5deg); }

        .audio-controls { display: flex; align-items: center; gap: 15px; }

        .lofi-btn {
            background: transparent; border: 2px solid var(--grey-mid); color: var(--ink-white);
            padding: 8px 16px; font-family: 'MobPsychoFont', sans-serif; font-size: 1.1rem;
            cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 8px;
        }
        .lofi-btn:hover { background: var(--ink-white); color: var(--dark); border-color: var(--ink-white); }
        .lofi-btn.playing { background: var(--ink-white); color: var(--dark); border-color: var(--ink-white); } 

        #volume-slider { -webkit-appearance: none; width: 80px; background: transparent; cursor: pointer; }
        #volume-slider::-webkit-slider-runnable-track { width: 100%; height: 4px; background: var(--grey-mid); border-radius: 2px; }
        #volume-slider::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 6px; background: var(--ink-white); margin-top: -6px; border-radius: 2px; transition: all 0.2s ease; }
        #volume-slider:hover::-webkit-slider-thumb { background: var(--psycho-cyan); transform: scale(1.3); box-shadow: 0 0 10px var(--psycho-cyan); }
        
        #side-nav {
            position: fixed; top: 50%; right: 2%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 20px; z-index: 80;
        }
        .nav-dot {
            color: #333; text-decoration: none; font-size: 1.1rem; 
            writing-mode: vertical-rl; transform: rotate(180deg); letter-spacing: 4px;
            transition: all 0.3s ease; cursor: pointer;
        }
        .nav-dot:hover, .nav-dot.active { color: var(--ink-white); transform: rotate(180deg) scale(1.1); }

        /* =========================================
           MOB PERSONNAGE
        ========================================= */
        #dimple-spirit {
            position: fixed; bottom: 40px; left: 40px;
            z-index: 80; pointer-events: none; opacity: 0;
        }
        body.page-loaded #dimple-spirit { animation: dimpleFade 16s infinite ease-in-out; }
        #ekubo-img { width: 110px; }
        @keyframes dimpleFade {
            0%   { opacity: 0; transform: translateY(15px); }
            10%  { opacity: 0; }
            30%  { opacity: 0.8; transform: translateY(-10px); }
            50%  { opacity: 0.8; transform: translateY(-5px); }
            70%  { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 0; }
        }

        /* =========================================
           SECTIONS PLEIN ÉCRAN
        ========================================= */
        main { padding: 0; margin: 0; }
        .photo-section {
            width: 100vw; height: 100vh;
            scroll-snap-align: start; scroll-snap-stop: always;
            position: relative; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        #about-section { background-color: var(--dark); }
        .about-card {
            background-color: var(--dark); color: var(--ink-white);
            padding: 3rem; max-width: 650px; width: 85%;
            border: 2px dashed var(--grey-mid); 
            box-shadow: 10px 10px 0 var(--ink-white);
        }
        .about-card h2 { font-size: 3rem; border-bottom: 2px solid var(--grey-mid); padding-bottom: 10px; margin-bottom: 1rem; }
        .about-card p { font-size: 1.3rem; line-height: 1.6; }

        .photo-section img.gallery-img {
            max-width: 85vw; max-height: 80vh; 
            object-fit: contain; 
            filter: grayscale(100%) contrast(1.3) brightness(0.9);
            border: 2px solid transparent;
            transition: all 0.5s ease;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><circle cx="16" cy="16" r="10" stroke="%23ffffff" stroke-width="2" fill="none"/></svg>') 16 16, pointer;
        }
        .photo-section:hover img.gallery-img {
            filter: grayscale(0%) contrast(1.05) brightness(1);
            transform: scale(1.02);
            border-color: var(--ink-white);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
        }

        /* =========================================
           LIGHTBOX ALBUM
        ========================================= */
        #lightbox {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(5, 5, 5, 0.98); z-index: 99999;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        #lightbox.active { opacity: 1; pointer-events: auto; }
        
        #lightbox img {
            max-width: 95vw; max-height: 90vh; object-fit: contain;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
            transition: opacity 0.2s ease; /* Transition de fondu corrigée */
            user-select: none; /* Empeche le "glisser-déposer" par erreur sur mobile */
        }
        
        #lightbox-close {
            position: absolute; top: 20px; right: 30px;
            font-size: 3rem; color: var(--grey-mid); cursor: pointer;
            transition: color 0.2s ease, transform 0.2s ease; z-index: 100000;
        }
        #lightbox-close:hover { color: var(--ink-white); transform: scale(1.2); }

        .lightbox-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: transparent; color: var(--grey-mid); border: none;
            font-family: 'MobPsychoFont', sans-serif; font-size: 4rem;
            cursor: pointer; transition: all 0.2s ease; z-index: 100000; display: none; 
        }
        .lightbox-nav:hover { color: var(--ink-white); text-shadow: 0 0 15px rgba(255,255,255,0.5); }
        #lightbox-prev { left: 2%; }
        #lightbox-next { right: 2%; }

        #lightbox-counter {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            font-family: 'MobPsychoFont', sans-serif; font-size: 1.5rem;
            color: var(--grey-light); display: none; z-index: 100000;
        }

        /* =========================================
           MODAL CONTACT
        ========================================= */
        #contact-modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(0, 0, 0, 0.95); z-index: 200;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
        }
        #contact-modal.active { opacity: 1; pointer-events: auto; }
        .contact-box {
            background-color: var(--dark); color: var(--ink-white); padding: 3rem; width: 90%; max-width: 550px;
            border: 2px solid var(--ink-white); box-shadow: 10px 10px 0px var(--grey-mid); 
            text-align: center; transform: translateY(30px); transition: transform 0.4s ease;
        }
        #contact-modal.active .contact-box { transform: translateY(0); }
        .contact-box h2 { font-size: 3rem; color: var(--ink-white); border-bottom: 2px dashed var(--grey-mid); padding-bottom: 1rem; }
        .contact-info-block { margin: 2.5rem 0; font-size: 1.3rem; }
        .contact-label { font-size: 1.1rem; color: var(--grey-light); letter-spacing: 2px; }
        .contact-value { 
            color: var(--dark); text-decoration: none; font-size: 1.5rem; 
            background-color: var(--ink-white); padding: 5px 12px; display: inline-block; 
            margin-top: 8px; transition: all 0.2s ease; 
        }
        .contact-value:hover { background-color: var(--grey-mid); color: white; }
        .close-contact-btn { 
            background: transparent; color: var(--ink-white); border: 2px solid var(--ink-white); 
            padding: 10px 25px; font-size: 1.2rem; cursor: pointer; margin-top: 1rem; 
            transition: all 0.2s ease; font-family: 'MobPsychoFont', sans-serif;
        }
        .close-contact-btn:hover { background: var(--ink-white); color: var(--dark); }

        /* =========================================
           RÉGLAGES MOBILES (RESPONSIVE)
        ========================================= */
        @media (max-width: 768px) {
            header { padding: 1rem 5%; }
            header .contact-link { font-size: 1.5rem; }
            .audio-controls { gap: 10px; }
            .lofi-btn { padding: 6px 12px; font-size: 0.9rem; }
            #volume-slider { width: 60px; }
            
            .about-card { padding: 1.5rem; }
            .about-card h2 { font-size: 2rem; }
            .about-card p { font-size: 1rem; }

            .photo-section img.gallery-img { max-width: 95vw; max-height: 85vh; }
            
            #side-nav { display: none; /* On cache les points latéraux sur petit écran pour laisser place à la photo */ }
            
            #dimple-spirit { bottom: 10px; left: 10px; }
            #ekubo-img { width: 70px; }

            .lightbox-nav { font-size: 2.5rem; }
            #lightbox-prev { left: 5px; }
            #lightbox-next { right: 5px; }
            
            .contact-box { padding: 1.5rem; }
            .contact-box h2 { font-size: 2rem; }
            .contact-value { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <!-- LECTEURS AUDIO -->
    <audio id="lofi-music" src="lofi.mp3" loop></audio>

    <!-- LOADER -->
    <div id="loader">
        <div id="bg-top" class="loader-bg"></div>
        <div id="bg-bottom" class="loader-bg"></div>
        <div id="slash"></div>
        <div id="mob-counter"><span id="mob-number">0</span><span id="mob-percent">%</span></div>
        <div id="mob-unknown">???%</div>
        <div id="insta-watermark">_mob.raw</div>
    </div>

    <!-- LIGHTBOX ALBUM -->
    <div id="lightbox">
        <span id="lightbox-close">X</span>
        <button id="lightbox-prev" class="lightbox-nav">&lt;</button>
        <img id="lightbox-img" src="" alt="Photo plein écran">
        <button id="lightbox-next" class="lightbox-nav">&gt;</button>
        <div id="lightbox-counter">[ 1 / 1 ]</div>
    </div>

    <!-- NAVIGATION LATÉRALE -->
    <nav id="side-nav">
        <a href="#about" class="nav-dot active">00</a>
        <a href="#photo-1" class="nav-dot">01</a>
        <a href="#photo-2" class="nav-dot">02</a>
        <a href="#photo-3" class="nav-dot">03</a>
        <a href="#photo-4" class="nav-dot">04</a>
    </nav>

    <!-- PERSONNAGE MOB -->
    <div id="dimple-spirit">
        <img src="ekubo.png" alt="Mob" id="ekubo-img">
    </div>

    <!-- HEADER -->
    <header>
        <h1 class="contact-link" id="open-contact">Contact</h1>
        <div class="audio-controls">
            <button class="lofi-btn" id="lofi-btn">♪ Beats</button>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
        </div>
    </header>

    <!-- MODAL CONTACT -->
    <div id="contact-modal">
        <div class="contact-box">
            <h2>◈ HIT ME UP ◈</h2>
            <div class="contact-info-block">
                <div class="contact-label">INSTAGRAM</div>
                <a href="https://instagram.com/_mob.raw" target="_blank" class="contact-value">@_mob.raw</a>
            </div>
            <div class="contact-info-block">
                <div class="contact-label">E-MAIL</div>
                <a href="mailto:contact.mob.raw@gmail.com" class="contact-value">contact.mob.raw@gmail.com</a>
            </div>
            <button class="close-contact-btn" id="close-contact">RETOUR</button>
        </div>
    </div>

    <!-- GALERIE -->
    <main>
        <section class="photo-section" id="about">
            <div class="about-card">
                <h2>◈ _mob.raw</h2>
                <p>T'as une DA en tête ? Besoin d'un photographe pour la mettre en œuvre ?</p>
                <p>J'suis là "brotha" and "sista", juste contacte-moi et on se fait ça directttt.</p>
            </div>
        </section>

        <section class="photo-section" id="photo-1">
            <img src="photos/shot1.jpg" alt="Shot 1" class="gallery-img" 
                 data-album="photos/shot1-b.jpg, photos/shot1-c.jpg, photos/shot1-d.jpg">
        </section>

        <section class="photo-section" id="photo-2">
            <img src="photos/shot2.jpg" alt="Shot 2" class="gallery-img"
                 data-album="photos/shot2-b.jpg, photos/shot2-c.jpg, photos/shot2-d.jpg">
        </section>

        <section class="photo-section" id="photo-3">
            <img src="photos/shot3.jpg" alt="Shot 3" class="gallery-img"
                 data-album="photos/shot3-b.jpg, photos/shot3-c.jpg, photos/shot3-d.jpg">
        </section>

        <section class="photo-section" id="photo-4">
            <img src="photos/shot4.jpg" alt="Shot 4" class="gallery-img"
                 data-album="photos/shot4-b.jpg, photos/shot4-c.jpg, photos/shot4-d.jpg">
        </section>
    </main>

    <script>
        // --- Forcer le scroll à la section 00 lors du rechargement ---
        if ('scrollRestoration' in history) {
            history.scrollRestoration = 'manual';
        }
        window.scrollTo(0, 0);

        document.addEventListener("DOMContentLoaded", () => {
            
            // --- LOADER ---
            let current = 0;
            const numberElement = document.getElementById('mob-number');
            const counterContainer = document.getElementById('mob-counter');
            const unknownContainer = document.getElementById('mob-unknown');
            const loaderElement = document.getElementById('loader');
            const instaWatermark = document.getElementById('insta-watermark');

            function getColor(percent) {
                if (percent <= 30) return `hsl(180, 100%, 80%)`;
                if (percent <= 60) return `hsl(280, 100%, 60%)`;
                if (percent <= 90) return `hsl(300, 100%, 50%)`;
                return `hsl(330, 100%, 50%)`; 
            }

            function updateCounter() {
                current += 1;
                if (current >= 100) {
                    current = 100;
                    numberElement.innerText = current;
                    counterContainer.style.color = "#ffffff"; 
                    counterContainer.style.textShadow = "0 0 20px rgba(255,255,255,0.5)";
                    
                    setTimeout(() => {
                        counterContainer.style.display = 'none';
                        instaWatermark.style.display = 'none';
                        
                        unknownContainer.style.display = 'block';
                        unknownContainer.classList.add('shake-active');

                        setTimeout(() => {
                            loaderElement.classList.add('slash-active');
                            
                            setTimeout(() => {
                                unknownContainer.style.display = 'none';
                                unknownContainer.classList.remove('shake-active');

                                loaderElement.classList.add('split');
                                document.body.classList.add('page-loaded');
                                
                                setTimeout(() => { loaderElement.style.display = 'none'; }, 1500);
                            }, 200); 
                        }, 600); 
                    }, 400); 
                    return; 
                }
                numberElement.innerText = current;
                counterContainer.style.color = getColor(current);
                counterContainer.style.textShadow = `0 0 10px ${getColor(current)}`;
                setTimeout(updateCounter, 25);
            }
            setTimeout(updateCounter, 500);

            // --- GESTION DU MODAL CONTACT ---
            document.getElementById('open-contact').addEventListener('click', () => {
                document.getElementById('contact-modal').classList.add('active');
            });
            document.getElementById('close-contact').addEventListener('click', () => {
                document.getElementById('contact-modal').classList.remove('active');
            });

            // --- LECTEUR AUDIO & VOLUME ---
            const lofiBtn = document.getElementById('lofi-btn');
            const lofiMusic = document.getElementById('lofi-music');
            const volumeSlider = document.getElementById('volume-slider');
            let isPlaying = false;

            lofiMusic.volume = volumeSlider.value;

            lofiBtn.addEventListener('click', () => {
                if (isPlaying) {
                    lofiMusic.pause();
                    lofiBtn.innerHTML = "♪ Beats";
                    lofiBtn.classList.remove('playing');
                } else {
                    lofiMusic.play();
                    lofiBtn.innerHTML = "⏸ Mute";
                    lofiBtn.classList.add('playing');
                }
                isPlaying = !isPlaying;
            });

            volumeSlider.addEventListener('input', (e) => {
                lofiMusic.volume = e.target.value;
            });

            // --- LIGHTBOX ALBUM AVEC PRÉCHARGEMENT & SWIPE MOBILE ---
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const galleryImages = document.querySelectorAll('.gallery-img');
            const prevBtn = document.getElementById('lightbox-prev');
            const nextBtn = document.getElementById('lightbox-next');
            const albumCounter = document.getElementById('lightbox-counter');

            let currentAlbumArray = [];
            let currentAlbumIndex = 0;

            function updateLightboxImage() {
                // Fait doucement disparaitre l'image
                lightboxImg.style.opacity = '0'; 
                
                // Précharge l'image EN CACHETTE pour éviter le flash
                setTimeout(() => {
                    const newSrc = currentAlbumArray[currentAlbumIndex];
                    const imgPreload = new Image();
                    
                    imgPreload.onload = () => {
                        // Une fois chargée, on l'affiche
                        lightboxImg.src = newSrc;
                        albumCounter.innerText = `[ ${currentAlbumIndex + 1} / ${currentAlbumArray.length} ]`;
                        lightboxImg.style.opacity = '1';
                    };
                    imgPreload.src = newSrc;
                }, 200); // 200ms correspond au temps du "fade out" css
            }

            galleryImages.forEach(img => {
                img.addEventListener('click', () => {
                    const extraPhotos = img.getAttribute('data-album');
                    
                    if (extraPhotos) {
                        const extraPhotosArray = extraPhotos.split(',').map(s => s.trim());
                        currentAlbumArray = [img.src, ...extraPhotosArray];
                        
                        prevBtn.style.display = 'block';
                        nextBtn.style.display = 'block';
                        albumCounter.style.display = 'block';
                    } else {
                        currentAlbumArray = [img.src];
                        prevBtn.style.display = 'none';
                        nextBtn.style.display = 'none';
                        albumCounter.style.display = 'none';
                    }

                    currentAlbumIndex = 0;
                    lightboxImg.src = currentAlbumArray[0];
                    albumCounter.innerText = `[ 1 / ${currentAlbumArray.length} ]`;
                    lightbox.classList.add('active');
                    lightboxImg.style.opacity = '1';
                });
            });

            // Contrôles Flèches
            prevBtn.addEventListener('click', (e) => {
                e.stopPropagation(); 
                currentAlbumIndex = (currentAlbumIndex - 1 + currentAlbumArray.length) % currentAlbumArray.length;
                updateLightboxImage();
            });

            nextBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                currentAlbumIndex = (currentAlbumIndex + 1) % currentAlbumArray.length;
                updateLightboxImage();
            });

            // Contrôle Swipe (Glisser sur téléphone)
            let touchstartX = 0;
            let touchendX = 0;

            lightbox.addEventListener('touchstart', e => {
                touchstartX = e.changedTouches[0].screenX;
            });

            lightbox.addEventListener('touchend', e => {
                touchendX = e.changedTouches[0].screenX;
                handleSwipe();
            });

            function handleSwipe() {
                if (currentAlbumArray.length <= 1) return;
                if (touchendX < touchstartX - 50) { // Glisse gauche -> Suivant
                    currentAlbumIndex = (currentAlbumIndex + 1) % currentAlbumArray.length;
                    updateLightboxImage();
                }
                if (touchendX > touchstartX + 50) { // Glisse droite -> Précédent
                    currentAlbumIndex = (currentAlbumIndex - 1 + currentAlbumArray.length) % currentAlbumArray.length;
                    updateLightboxImage();
                }
            }

            // Navigation Clavier
            document.addEventListener('keydown', (e) => {
                if (!lightbox.classList.contains('active')) return;

                if (e.key === 'Escape') {
                    lightbox.classList.remove('active');
                } else if (e.key === 'ArrowLeft' && currentAlbumArray.length > 1) {
                    currentAlbumIndex = (currentAlbumIndex - 1 + currentAlbumArray.length) % currentAlbumArray.length;
                    updateLightboxImage();
                } else if (e.key === 'ArrowRight' && currentAlbumArray.length > 1) {
                    currentAlbumIndex = (currentAlbumIndex + 1) % currentAlbumArray.length;
                    updateLightboxImage();
                }
            });

            // Fermer Lightbox
            lightbox.addEventListener('click', (e) => {
                if (e.target !== lightboxImg && e.target !== prevBtn && e.target !== nextBtn) {
                    lightbox.classList.remove('active');
                }
            });

            // --- SYNCHRONISATION NAVIGATION LATÉRALE ---
            const sections = document.querySelectorAll('.photo-section');
            const navDots = document.querySelectorAll('.nav-dot');
            const observerOptions = { root: null, rootMargin: '0px', threshold: 0.5 };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        navDots.forEach(dot => dot.classList.remove('active'));
                        const id = entry.target.getAttribute('id');
                        document.querySelector(`.nav-dot[href="#${id}"]`).classList.add('active');
                    }
                });
            }, observerOptions);

            sections.forEach(section => observer.observe(section));
        });
    </script>
</body>
</html>
